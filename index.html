<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HaxBall Multiplayer · PeerJS</title>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <style>
    /* Estilos (igual que antes, se omite por brevedad) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(145deg, #0b1a2e, #0d1f33); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', system-ui, sans-serif; padding: 16px; }
    .game-wrapper { background: #1f3a4b; border-radius: 40px; padding: 20px; box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 0 4px #5f8aa0; max-width: 820px; width: 100%; }
    .status-bar { background: #0f2633; border-radius: 60px; padding: 10px 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; color: #8db9cc; font-size: 0.85rem; }
    .status-bar .room-id { background: #1a3a47; padding: 4px 14px; border-radius: 30px; font-family: monospace; color: #7fc1db; font-size: 0.8rem; word-break: break-all; max-width: 200px; }
    .status-bar .copy-btn { background: #264f5e; border: none; color: #c3e2f0; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; }
    .player-panel { background: #0f2633; border-radius: 60px; padding: 12px 18px; margin-bottom: 18px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px 14px; box-shadow: inset 0 3px 6px rgba(0,0,0,0.6), 0 2px 0 #3b6a7c; }
    .player-panel input { background: #1b3b4a; border: none; border-radius: 40px; padding: 8px 16px; font-size: 0.95rem; color: #eaf6fc; outline: 2px solid transparent; transition: 0.2s; min-width: 120px; flex: 1 1 130px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
    .player-panel input:focus { outline: 2px solid #7fc1db; background: #214c5e; }
    .player-panel input:disabled { opacity: 0.5; cursor: not-allowed; }
    .team-selector { display: flex; gap: 8px; background: #18323f; padding: 5px 10px; border-radius: 50px; }
    .team-btn { background: transparent; border: 2px solid transparent; border-radius: 40px; padding: 5px 14px; font-weight: 600; font-size: 0.85rem; color: #bddbe8; cursor: pointer; transition: 0.2s; }
    .team-btn.azul { border-color: #3b9bc7; color: #b0ddf5; }
    .team-btn.azul.active { background: #2a7fa3; color: white; box-shadow: 0 0 8px #4bb3e0; }
    .team-btn.rojo { border-color: #c75f5f; color: #f5c0c0; }
    .team-btn.rojo.active { background: #a34040; color: white; box-shadow: 0 0 8px #e06060; }
    .action-btn { border: none; border-radius: 40px; padding: 8px 20px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: 0.08s linear; flex: 0 1 auto; }
    .action-btn:active { transform: translateY(3px); }
    .action-btn:disabled { opacity: 0.5; transform: translateY(2px); cursor: not-allowed; }
    .action-btn.join { background: #3f8a6b; color: white; box-shadow: 0 4px 0 #1f4f3a, inset 0 1px 2px #a5e0c0; }
    .action-btn.leave { background: #8a3f3f; color: white; box-shadow: 0 4px 0 #4f1f1f, inset 0 1px 2px #e0a5a5; display: none; }
    .action-btn.host { background: #3f6b8a; color: white; box-shadow: 0 4px 0 #1f3f4f, inset 0 1px 2px #a5c0e0; }
    .action-btn.connect { background: #6b8a3f; color: white; box-shadow: 0 4px 0 #3f4f1f, inset 0 1px 2px #c0e0a5; }
    .join-input-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .join-input-group input { min-width: 150px; flex: 0 1 160px; }
    .player-list { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px 12px; background: #0b202b; border-radius: 40px; padding: 6px 16px; min-height: 38px; flex: 2 1 200px; }
    .player-tag { background: #1f4052; padding: 4px 14px 4px 12px; border-radius: 30px; display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500; color: #deedf5; box-shadow: inset 0 1px 3px #2d5a6e; }
    .player-tag .dot { display: inline-block; width: 12px; height: 12px; border-radius: 12px; background: #3b9bc7; }
    .player-tag .dot.rojo { background: #c75f5f; }
    .player-tag .you { font-size: 0.65rem; background: #2a7fa3; padding: 0 8px; border-radius: 12px; color: white; }
    .canvas-container { background: #1f4f5e; border-radius: 40px; padding: 12px; box-shadow: inset 0 -6px 0 #0e2e38, 0 10px 20px rgba(0,0,0,0.5); }
    #haxballCanvas { display: block; width: 100%; height: auto; aspect-ratio: 800 / 500; background: #2d7d6e; border-radius: 28px; box-shadow: inset 0 0 0 4px #205a4e, inset 0 0 0 8px #358577; cursor: none; touch-action: none; }
    .info-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; color: #8db9cc; font-size: 0.8rem; padding: 0 8px; flex-wrap: wrap; gap: 6px; }
    .info-footer .controls-hint { display: flex; gap: 12px; flex-wrap: wrap; }
    .info-footer .controls-hint span { background: #1a3a47; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
    .info-footer .player-count { background: #1a3a47; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f3a4b; color: #eaf6fc; padding: 12px 24px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid #3b6a7c; z-index: 999; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    @media (max-width: 600px) { .player-panel { flex-direction: column; align-items: stretch; gap: 8px; } .team-selector { justify-content: center; } .action-btn { width: 100%; } .join-input-group { flex-direction: column; } .join-input-group input { width: 100%; } .status-bar { flex-direction: column; align-items: stretch; text-align: center; } .status-bar .room-id { max-width: 100%; } }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="status-bar" id="statusBar">
    <span>🔗 Estado: <span id="connectionStatus">Conectando...</span></span>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="room-id" id="roomIdDisplay">Sin sala</span>
      <button class="copy-btn" id="copyRoomBtn" style="display:none;">📋 Copiar ID</button>
    </div>
  </div>

  <div class="player-panel" id="playerPanel">
    <input type="text" id="playerNameInput" placeholder="Tu nombre" value="Jugador" maxlength="14">
    <div class="team-selector">
      <button class="team-btn azul active" data-team="azul">🔵 Azul</button>
      <button class="team-btn rojo" data-team="rojo">🔴 Rojo</button>
    </div>
    <button class="action-btn host" id="hostBtn">🏠 Crear Sala</button>
    <div class="join-input-group">
      <input type="text" id="roomIdInput" placeholder="ID de sala" maxlength="40">
      <button class="action-btn connect" id="connectBtn">🔗 Unirse</button>
    </div>
    <button class="action-btn join" id="joinBtn" style="display:none;">✅ En partida</button>
    <button class="action-btn leave" id="leaveBtn">🚪 Salir</button>
    <div class="player-list" id="playerListContainer">
      <span style="color:#6f9eb0; font-size:0.8rem; opacity:0.7;">👥 Sin jugadores</span>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="haxballCanvas" width="800" height="500"></canvas>
  </div>

  <div class="info-footer">
    <div class="controls-hint">
      <span>⬆⬇⬅➡ / WASD</span>
      <span>⚡ Espacio: disparo</span>
    </div>
    <span class="player-count" id="playerCount">Jugadores: 0</span>
  </div>
</div>

<script>
(function() {
  // --- CONSTANTES ---
  const CANVAS_WIDTH = 800;
  const CANVAS_HEIGHT = 500;
  const BALL_RADIUS = 10;
  const PLAYER_RADIUS = 15;
  const PLAYER_SPEED = 4.2;
  const FRICTION = 0.985;
  const WALL_BOUNCE = 0.7;
  const GOAL_SIZE = 120;
  const KICK_POWER = 6.5;

  // --- OPERACIONES VECTORIALES ---
  const add = (v1, v2) => ({ x: v1.x + v2.x, y: v1.y + v2.y });
  const sub = (v1, v2) => ({ x: v1.x - v2.x, y: v1.y - v2.y });
  const mul = (v, s) => ({ x: v.x * s, y: v.y * s });
  const div = (v, s) => ({ x: v.x / s, y: v.y / s });
  const dot = (v1, v2) => v1.x * v2.x + v1.y * v2.y;
  const magSq = (v) => v.x * v.x + v.y * v.y;
  const mag = (v) => Math.sqrt(magSq(v));
  const normalize = (v) => { const m = mag(v); return m === 0 ? { x: 0, y: 0 } : div(v, m); };
  const dist = (v1, v2) => mag(sub(v1, v2));
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  const resolveCollision = (p1, v1, m1, p2, v2, m2) => {
    const xDiff = sub(p1, p2);
    const vDiff = sub(v1, v2);
    const mFactor1 = (2 * m2) / (m1 + m2);
    const dotVal1 = dot(vDiff, xDiff) / magSq(xDiff);
    const newV1 = sub(v1, mul(xDiff, mFactor1 * dotVal1));
    const xDiff2 = sub(p2, p1);
    const vDiff2 = sub(v2, v1);
    const mFactor2 = (2 * m1) / (m1 + m2);
    const dotVal2 = dot(vDiff2, xDiff2) / magSq(xDiff2);
    const newV2 = sub(v2, mul(xDiff2, mFactor2 * dotVal2));
    return { v1: newV1, v2: newV2 };
  };

  // --- CLASES ---
  class Player {
    constructor(id, name, team, x, y) {
      this.id = id;
      this.name = name;
      this.team = team;
      this.pos = { x, y };
      this.vel = { x: 0, y: 0 };
      this.radius = PLAYER_RADIUS;
      this.mass = 1;
      this.kicking = false;
    }
    update() {
      this.pos.x += this.vel.x;
      this.pos.y += this.vel.y;
      this.vel.x *= FRICTION;
      this.vel.y *= FRICTION;
    }
    toJSON() {
      return { id: this.id, name: this.name, team: this.team, pos: this.pos, vel: this.vel, kicking: this.kicking };
    }
    static fromJSON(data) {
      const p = new Player(data.id, data.name, data.team, data.pos.x, data.pos.y);
      p.vel = data.vel;
      p.kicking = data.kicking;
      return p;
    }
  }

  class Ball {
    constructor(x, y) {
      this.pos = { x, y };
      this.vel = { x: 0, y: 0 };
      this.radius = BALL_RADIUS;
      this.mass = 0.5;
    }
    update() {
      this.pos.x += this.vel.x;
      this.pos.y += this.vel.y;
      this.vel.x *= FRICTION;
      this.vel.y *= FRICTION;
    }
    toJSON() {
      return { pos: this.pos, vel: this.vel };
    }
    static fromJSON(data) {
      const b = new Ball(data.pos.x, data.pos.y);
      b.vel = data.vel;
      return b;
    }
  }

  // --- ESTADO ---
  const state = {
    players: [],
    ball: new Ball(CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2),
    nextId: 1,
    localPlayerId: null,
    isJoined: false,
    isHost: false,
    score: { azul: 0, rojo: 0 },
    peer: null,
    connections: [],
    roomId: null,
    isPeerReady: false,
    lastInputSend: 0
  };

  // Almacena los inputs de cada jugador (solo para el host)
  const playerInputs = {};

  let localInputs = { up: false, down: false, left: false, right: false, kick: false };
  let selectedTeam = 'azul';
  let animationId = null;
  let isGameLoopRunning = false;

  // --- DOM ---
  const canvas = document.getElementById('haxballCanvas');
  const ctx = canvas.getContext('2d');
  const playerListContainer = document.getElementById('playerListContainer');
  const nameInput = document.getElementById('playerNameInput');
  const joinBtn = document.getElementById('joinBtn');
  const leaveBtn = document.getElementById('leaveBtn');
  const hostBtn = document.getElementById('hostBtn');
  const connectBtn = document.getElementById('connectBtn');
  const roomIdInput = document.getElementById('roomIdInput');
  const roomIdDisplay = document.getElementById('roomIdDisplay');
  const copyRoomBtn = document.getElementById('copyRoomBtn');
  const connectionStatus = document.getElementById('connectionStatus');
  const playerCount = document.getElementById('playerCount');
  const teamBtns = document.querySelectorAll('.team-btn');

  // --- TOAST ---
  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // --- PEER ---
  function initPeer() {
    return new Promise((resolve) => {
      const peer = new Peer();
      peer.on('open', (id) => {
        state.peer = peer;
        state.roomId = id;
        state.isPeerReady = true;
        roomIdDisplay.textContent = `ID: ${id}`;
        copyRoomBtn.style.display = 'inline-block';
        document.getElementById('connectionStatus').textContent = 'Conectado';
        document.getElementById('connectionStatus').style.color = '#7fc1db';
        resolve(peer);
      });
      peer.on('error', (err) => {
        console.error('Peer error:', err);
        document.getElementById('connectionStatus').textContent = 'Error: ' + err.message;
        document.getElementById('connectionStatus').style.color = '#e06060';
        showToast('❌ Error en PeerJS: ' + err.message);
        state.isPeerReady = false;
      });
      peer.on('disconnected', () => {
        document.getElementById('connectionStatus').textContent = 'Desconectado';
        document.getElementById('connectionStatus').style.color = '#e06060';
        showToast('⚠️ Desconectado del servidor');
        state.isPeerReady = false;
      });
    });
  }

  // --- FUNCIONES DEL JUEGO ---
  function addPlayer(name, team) {
    if (!name.trim()) { showToast('❌ Escribe un nombre'); return false; }
    if (state.isJoined) { showToast('⚠️ Ya estás en la partida'); return false; }
    const exists = state.players.some(p => p.name.toLowerCase() === name.trim().toLowerCase());
    if (exists) { showToast(`❌ El nombre "${name.trim()}" ya está en uso`); return false; }

    const x = team === 'rojo' ? 150 : CANVAS_WIDTH - 150;
    const y = CANVAS_HEIGHT / 2 + (Math.random() * 60 - 30);
    const player = new Player(state.nextId++, name.trim(), team, x, y);
    state.players.push(player);
    state.localPlayerId = player.id;
    state.isJoined = true;

    nameInput.disabled = true;
    joinBtn.style.display = 'inline-block';
    joinBtn.textContent = '✅ En partida';
    joinBtn.disabled = true;
    leaveBtn.style.display = 'inline-block';
    teamBtns.forEach(b => b.style.pointerEvents = 'none');
    hostBtn.disabled = true;
    connectBtn.disabled = true;
    roomIdInput.disabled = true;

    if (!state.isHost && state.connections.length > 0) {
      state.connections.forEach(conn => {
        if (conn.open) {
          conn.send({ type: 'PLAYER_JOIN', payload: { name: player.name, team: player.team } });
        }
      });
    }
    updateUI();
    return true;
  }

  function removeLocalPlayer() {
    if (!state.isJoined) return;
    if (!state.isHost && state.connections.length > 0) {
      state.connections.forEach(conn => {
        if (conn.open) {
          conn.send({ type: 'PLAYER_LEAVE', payload: { id: state.localPlayerId } });
        }
      });
    }
    state.players = state.players.filter(p => p.id !== state.localPlayerId);
    state.localPlayerId = null;
    state.isJoined = false;
    nameInput.disabled = false;
    joinBtn.style.display = 'none';
    joinBtn.disabled = false;
    leaveBtn.style.display = 'none';
    teamBtns.forEach(b => b.style.pointerEvents = 'auto');
    hostBtn.disabled = false;
    connectBtn.disabled = false;
    roomIdInput.disabled = false;
    if (state.players.length === 0) resetBall();
    updateUI();
  }

  // --- FÍSICA (SOLO HOST) ---
  function updatePhysics() {
    const ball = state.ball;

    // Aplicar inputs a cada jugador
    state.players.forEach(player => {
      let inputs;
      if (player.id === state.localPlayerId) {
        inputs = localInputs;
      } else {
        inputs = playerInputs[player.id] || { up: false, down: false, left: false, right: false, kick: false };
      }

      let moveX = 0, moveY = 0;
      if (inputs.up) moveY -= 1;
      if (inputs.down) moveY += 1;
      if (inputs.left) moveX -= 1;
      if (inputs.right) moveX += 1;

      if (moveX !== 0 || moveY !== 0) {
        const dir = normalize({ x: moveX, y: moveY });
        player.vel.x += dir.x * 0.5;
        player.vel.y += dir.y * 0.5;
        const speed = mag(player.vel);
        if (speed > PLAYER_SPEED) {
          player.vel = mul(player.vel, PLAYER_SPEED / speed);
        }
      }
      player.kicking = inputs.kick;
      player.update();
      player.pos.x = clamp(player.pos.x, player.radius, CANVAS_WIDTH - player.radius);
      player.pos.y = clamp(player.pos.y, player.radius, CANVAS_HEIGHT - player.radius);
    });

    // Actualizar pelota
    ball.update();

    if (ball.pos.y < ball.radius || ball.pos.y > CANVAS_HEIGHT - ball.radius) {
      ball.vel.y *= -WALL_BOUNCE;
      ball.pos.y = ball.pos.y < ball.radius ? ball.radius : CANVAS_HEIGHT - ball.radius;
    }

    const inGoalY = ball.pos.y > (CANVAS_HEIGHT - GOAL_SIZE) / 2 && ball.pos.y < (CANVAS_HEIGHT + GOAL_SIZE) / 2;
    if (ball.pos.x < ball.radius) {
      if (inGoalY) { state.score.azul++; resetPositions(); return; }
      else { ball.vel.x *= -WALL_BOUNCE; ball.pos.x = ball.radius; }
    } else if (ball.pos.x > CANVAS_WIDTH - ball.radius) {
      if (inGoalY) { state.score.rojo++; resetPositions(); return; }
      else { ball.vel.x *= -WALL_BOUNCE; ball.pos.x = CANVAS_WIDTH - ball.radius; }
    }

    // Colisiones jugador-jugador
    for (let i = 0; i < state.players.length; i++) {
      for (let j = i + 1; j < state.players.length; j++) {
        const p1 = state.players[i];
        const p2 = state.players[j];
        if (dist(p1.pos, p2.pos) < p1.radius + p2.radius) {
          const result = resolveCollision(p1.pos, p1.vel, p1.mass, p2.pos, p2.vel, p2.mass);
          p1.vel = result.v1;
          p2.vel = result.v2;
          const overlap = (p1.radius + p2.radius) - dist(p1.pos, p2.pos);
          const dir = normalize(sub(p1.pos, p2.pos));
          p1.pos = add(p1.pos, mul(dir, overlap / 2));
          p2.pos = sub(p2.pos, mul(dir, overlap / 2));
        }
      }
    }

    // Colisiones jugador-pelota
    state.players.forEach(player => {
      if (dist(player.pos, ball.pos) < player.radius + ball.radius) {
        const result = resolveCollision(player.pos, player.vel, player.mass, ball.pos, ball.vel, ball.mass);
        ball.vel = result.v2;
        if (player.kicking) {
          const dir = normalize(sub(ball.pos, player.pos));
          ball.vel = add(ball.vel, mul(dir, KICK_POWER));
        }
        const overlap = (player.radius + ball.radius) - dist(player.pos, ball.pos);
        const dir = normalize(sub(ball.pos, player.pos));
        ball.pos = add(ball.pos, mul(dir, overlap + 0.5));
      }
    });
  }

  function resetPositions() {
    state.ball.pos = { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT / 2 };
    state.ball.vel = { x: 0, y: 0 };
    state.players.forEach(p => {
      p.pos = { x: p.team === 'rojo' ? 150 : CANVAS_WIDTH - 150, y: CANVAS_HEIGHT / 2 + (Math.random() * 60 - 30) };
      p.vel = { x: 0, y: 0 };
    });
  }

  function resetBall() {
    state.ball.pos = { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT / 2 };
    state.ball.vel = { x: 0, y: 0 };
  }

  // --- RENDER ---
  function draw() {
    const W = CANVAS_WIDTH, H = CANVAS_HEIGHT;
    ctx.fillStyle = '#1d5e2e';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#256d37';
    const stripWidth = W / 15;
    for (let i = 0; i < 15; i += 2) ctx.fillRect(i * stripWidth, 0, stripWidth, H);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.strokeRect(10, 10, W - 20, H - 20);
    ctx.beginPath();
    ctx.moveTo(W / 2, 10);
    ctx.lineTo(W / 2, H - 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 70, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(0, (H - GOAL_SIZE) / 2, 10, GOAL_SIZE);
    ctx.fillStyle = '#2980b9';
    ctx.fillRect(W - 10, (H - GOAL_SIZE) / 2, 10, GOAL_SIZE);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.strokeRect(0, (H - GOAL_SIZE) / 2, 10, GOAL_SIZE);
    ctx.strokeRect(W - 10, (H - GOAL_SIZE) / 2, 10, GOAL_SIZE);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 60, 8, 120, 32);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${state.score.rojo} - ${state.score.azul}`, W/2, 24);

    state.players.forEach(p => {
      const color = p.team === 'rojo' ? '#e74c3c' : '#3498db';
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 2;
      ctx.stroke();
      if (p.kicking) {
        ctx.beginPath();
        ctx.arc(p.pos.x, p.pos.y, p.radius + 4, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 4;
      ctx.fillText(p.name, p.pos.x, p.pos.y - p.radius - 6);
      ctx.shadowBlur = 0;
      if (p.id === state.localPlayerId) {
        ctx.fillStyle = '#ffdd57';
        ctx.font = 'bold 9px sans-serif';
        ctx.fillText('★ TÚ', p.pos.x, p.pos.y + p.radius + 14);
      }
    });

    const b = state.ball;
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(b.pos.x, b.pos.y, b.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.pos.x - 3, b.pos.y - 3, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#dddddd';
    ctx.fill();
  }

  // --- UI ---
  function renderPlayerList() {
    if (state.players.length === 0) {
      playerListContainer.innerHTML = `<span style="color:#6f9eb0; font-size:0.8rem; opacity:0.7;">👥 Sin jugadores</span>`;
      return;
    }
    let html = '';
    state.players.forEach(p => {
      const dotClass = p.team === 'azul' ? 'dot' : 'dot rojo';
      const youTag = p.id === state.localPlayerId ? '<span class="you">TÚ</span>' : '';
      html += `<span class="player-tag"><span class="${dotClass}"></span>${p.name}${youTag}</span>`;
    });
    playerListContainer.innerHTML = html;
    playerCount.textContent = `Jugadores: ${state.players.length}`;
  }

  function updateUI() { renderPlayerList(); }

  // --- GAME LOOP ---
  function gameLoop() {
    if (state.isHost) {
      updatePhysics();
      const gameState = {
        players: state.players.map(p => p.toJSON()),
        ball: state.ball.toJSON(),
        score: state.score
      };
      state.connections.forEach(conn => {
        if (conn.open) conn.send({ type: 'STATE_UPDATE', payload: gameState });
      });
    } else {
      // Cliente: enviar inputs al host
      const now = Date.now();
      if (now - state.lastInputSend > 50) {
        state.connections.forEach(conn => {
          if (conn.open) {
            conn.send({
              type: 'INPUT',
              payload: { id: state.localPlayerId, inputs: localInputs }
            });
          }
        });
        state.lastInputSend = now;
      }
    }
    draw();
    animationId = requestAnimationFrame(gameLoop);
  }

  function startGameLoop() {
    if (!isGameLoopRunning) {
      isGameLoopRunning = true;
      gameLoop();
    }
  }

  // --- MANEJO DE CONEXIONES (HOST) ---
  function setupHostConnections() {
    state.peer.on('connection', (conn) => {
      state.connections.push(conn);
      document.getElementById('connectionStatus').textContent = `Host: ${state.connections.length} conectados`;
      document.getElementById('connectionStatus').style.color = '#7fc1db';

      conn.on('data', (data) => {
        if (data.type === 'PLAYER_JOIN') {
          // Cliente se une: creamos jugador
          const name = data.payload.name;
          const team = data.payload.team;
          const x = team === 'rojo' ? 150 : CANVAS_WIDTH - 150;
          const y = CANVAS_HEIGHT / 2 + (Math.random() * 60 - 30);
          const player = new Player(state.nextId++, name, team, x, y);
          state.players.push(player);

          // Enviar estado completo al nuevo cliente
          const gameState = {
            players: state.players.map(p => p.toJSON()),
            ball: state.ball.toJSON(),
            score: state.score
          };
          conn.send({ type: 'INIT_STATE', payload: gameState });

          // Notificar a otros clientes
          state.connections.forEach(c => {
            if (c !== conn && c.open) {
              c.send({ type: 'PLAYER_JOIN', payload: player.toJSON() });
            }
          });
          updateUI();
          showToast(`👤 ${player.name} se unió al juego`);
        } else if (data.type === 'PLAYER_LEAVE') {
          const id = data.payload.id;
          const leavingPlayer = state.players.find(p => p.id === id);
          state.players = state.players.filter(p => p.id !== id);
          delete playerInputs[id];
          state.connections.forEach(c => {
            if (c.open) c.send({ type: 'PLAYER_LEAVE', payload: { id } });
          });
          updateUI();
          if (leavingPlayer) showToast(`👋 ${leavingPlayer.name} abandonó el juego`);
        } else if (data.type === 'INPUT') {
          const id = data.payload.id;
          const inputs = data.payload.inputs;
          if (id) {
            playerInputs[id] = inputs;
          }
        }
      });

      conn.on('close', () => {
        state.connections = state.connections.filter(c => c !== conn);
        document.getElementById('connectionStatus').textContent = `Host: ${state.connections.length} conectados`;
        document.getElementById('connectionStatus').style.color = '#7fc1db';
        showToast('👋 Un jugador se ha desconectado');
      });
    });
  }

  // --- CONECTARSE COMO CLIENTE ---
  function connectToHost(hostId) {
    if (!state.peer || !state.isPeerReady) {
      showToast('❌ Esperando conexión...');
      return;
    }
    const conn = state.peer.connect(hostId);
    conn.on('open', () => {
      state.connections.push(conn);
      document.getElementById('connectionStatus').textContent = 'Conectado al host';
      document.getElementById('connectionStatus').style.color = '#7fc1db';
      showToast('✅ Conectado a la sala');
      roomIdDisplay.textContent = `Sala: ${hostId}`;
      // Enviar solicitud de unión
      const name = nameInput.value.trim() || 'Jugador';
      const team = selectedTeam;
      conn.send({ type: 'PLAYER_JOIN', payload: { name, team } });
    });

    conn.on('data', (data) => {
      if (data.type === 'INIT_STATE') {
        const payload = data.payload;
        state.players = payload.players.map(p => Player.fromJSON(p));
        state.ball = Ball.fromJSON(payload.ball);
        state.score = payload.score;
        // Buscar nuestro jugador por nombre
        const myName = nameInput.value.trim();
        const myPlayer = state.players.find(p => p.name === myName);
        if (myPlayer) {
          state.localPlayerId = myPlayer.id;
          state.isJoined = true;
          nameInput.disabled = true;
          joinBtn.style.display = 'inline-block';
          joinBtn.textContent = '✅ En partida';
          joinBtn.disabled = true;
          leaveBtn.style.display = 'inline-block';
          teamBtns.forEach(b => b.style.pointerEvents = 'none');
          hostBtn.disabled = true;
          connectBtn.disabled = true;
          roomIdInput.disabled = true;
        }
        updateUI();
        startGameLoop();
        showToast('🎮 ¡Partida iniciada!');
      } else if (data.type === 'STATE_UPDATE') {
        const payload = data.payload;
        state.players = payload.players.map(p => Player.fromJSON(p));
        state.ball = Ball.fromJSON(payload.ball);
        state.score = payload.score;
        updateUI();
      } else if (data.type === 'PLAYER_JOIN') {
        const player = Player.fromJSON(data.payload);
        state.players.push(player);
        updateUI();
        showToast(`👤 ${player.name} se unió`);
      } else if (data.type === 'PLAYER_LEAVE') {
        const id = data.payload.id;
        const leavingPlayer = state.players.find(p => p.id === id);
        state.players = state.players.filter(p => p.id !== id);
        updateUI();
        if (leavingPlayer) showToast(`👋 ${leavingPlayer.name} abandonó`);
      }
    });

    conn.on('close', () => {
      state.connections = state.connections.filter(c => c !== conn);
      document.getElementById('connectionStatus').textContent = 'Desconectado del host';
      document.getElementById('connectionStatus').style.color = '#e06060';
      showToast('⚠️ Desconectado del host');
      state.players = [];
      state.isJoined = false;
      state.localPlayerId = null;
      nameInput.disabled = false;
      joinBtn.style.display = 'none';
      joinBtn.disabled = false;
      leaveBtn.style.display = 'none';
      teamBtns.forEach(b => b.style.pointerEvents = 'auto');
      hostBtn.disabled = false;
      connectBtn.disabled = false;
      roomIdInput.disabled = false;
      updateUI();
    });

    conn.on('error', (err) => {
      showToast('❌ Error de conexión: ' + err.message);
      document.getElementById('connectionStatus').textContent = 'Error de conexión';
      document.getElementById('connectionStatus').style.color = '#e06060';
    });
  }

  // --- INICIALIZACIÓN ---
  async function init() {
    document.querySelector('.team-btn.azul')?.classList.add('active');

    try {
      await initPeer();
      document.getElementById('connectionStatus').textContent = 'Listo';
      document.getElementById('connectionStatus').style.color = '#7fc1db';
    } catch (err) {
      console.error('Error init peer:', err);
      document.getElementById('connectionStatus').textContent = 'Error';
      document.getElementById('connectionStatus').style.color = '#e06060';
    }

    // Eventos UI
    teamBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        if (state.isJoined) return;
        teamBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        selectedTeam = this.dataset.team;
      });
    });

    hostBtn.addEventListener('click', () => {
      if (state.isJoined) return;
      if (!state.peer || !state.isPeerReady) {
        showToast('❌ Esperando conexión...');
        return;
      }
      state.isHost = true;
      document.getElementById('connectionStatus').textContent = 'Host activo';
      document.getElementById('connectionStatus').style.color = '#7fc1db';
      showToast('🏠 Sala creada! Comparte el ID');
      setupHostConnections();
      const name = nameInput.value.trim() || 'Host';
      addPlayer(name, selectedTeam);
      hostBtn.style.display = 'none';
      connectBtn.style.display = 'none';
      roomIdInput.style.display = 'none';
      startGameLoop();
    });

    connectBtn.addEventListener('click', () => {
      const roomId = roomIdInput.value.trim();
      if (!roomId) { showToast('❌ Ingresa un ID de sala'); return; }
      connectToHost(roomId);
    });

    roomIdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connectBtn.click();
    });

    leaveBtn.addEventListener('click', removeLocalPlayer);
    copyRoomBtn.addEventListener('click', copyRoomId);

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !state.isJoined) {
        if (state.isHost) hostBtn.click();
        else connectBtn.click();
      }
    });

    // --- CONTROLES DE TECLADO ---
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      const key = e.key.toLowerCase();
      if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'w', 'a', 's', 'd'].includes(key) || e.key.startsWith('Arrow')) {
        e.preventDefault();
      }
      switch (key) {
        case 'arrowup': case 'w': localInputs.up = true; break;
        case 'arrowdown': case 's': localInputs.down = true; break;
        case 'arrowleft': case 'a': localInputs.left = true; break;
        case 'arrowright': case 'd': localInputs.right = true; break;
        case ' ': localInputs.kick = true; break;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.target.tagName === 'INPUT') return;
      const key = e.key.toLowerCase();
      switch (key) {
        case 'arrowup': case 'w': localInputs.up = false; break;
        case 'arrowdown': case 's': localInputs.down = false; break;
        case 'arrowleft': case 'a': localInputs.left = false; break;
        case 'arrowright': case 'd': localInputs.right = false; break;
        case ' ': localInputs.kick = false; break;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === ' ' || e.key.startsWith('Arrow')) e.preventDefault();
    }, { passive: false });

    updateUI();
    startGameLoop();
  }

  function copyRoomId() {
    if (state.roomId) {
      navigator.clipboard.writeText(state.roomId).then(() => {
        showToast('✅ ID de sala copiado');
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = state.roomId;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
        showToast('✅ ID de sala copiado');
      });
    }
  }

  init();
})();
</script>
</body>
